version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: heliolabs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/heliolabs
    depends_on:
      - db
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env.example
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"

